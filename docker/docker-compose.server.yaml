services:
  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    image: haberrj/avian-acoustic-monitoring:latest
    env_file:
      - ../.env
    environment:
      - POSTGRES_HOST=db
    command: ["uvicorn", "src.server.api:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - db
    ports:
      - "8000:8000"

  migrate:
    profiles:
      - jobs
    environment:
      - POSTGRES_HOST=db
    image: haberrj/avian-acoustic-monitoring:latest
    depends_on:
      - db
    env_file:
      - ../.env
    command: ["python", "src/storage/migrate.py"]

  dashboard:
    environment:
      - POSTGRES_HOST=db
    image: haberrj/avian-acoustic-monitoring:latest
    depends_on:
      - db
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    command: [
      "streamlit",
      "run",
      "dashboard/app.py",
      "--server.port=3000",
      "--server.address=0.0.0.0"
    ]
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: avian_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - dashboard

volumes:
  postgres_data: