services:
  recorder:
    profiles:
      - jobs
    image: haberrj/avian-acoustic-monitoring:latest
    container_name: avian_recorder
    env_file:
      - ../.env
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    volumes:
      - ../recordings:/app/recordings
      - ../logs:/app/logs
    restart: "no"
    command: ["python", "src/node/pipeline.py"]