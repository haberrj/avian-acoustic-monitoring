services:
  db:
    image: postgres:15
    container_name: acoustic_db
    restart: always

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  migrate:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    command: ["python", "src/storage/migrate.py"]

  dashboard:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "3000:3000"
    command: [
      "streamlit",
      "run",
      "dashboard/app.py",
      "--server.port=3000",
      "--server.address=0.0.0.0"
    ]


volumes:
  postgres_data: